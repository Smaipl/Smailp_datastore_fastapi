version: "3.8"

services:
  db:
    image: docker-hub.vgorovetskiy.keenetic.pro/postgres:15
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - datastore-network
    expose:
      - "5432"

  app:
    image: docker-hub.vgorovetskiy.keenetic.pro/datastore_fastapi-app:2.1.0
    container_name: data_storage_app
    env_file: .env
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}"
    volumes:
      - ./migrations:/migrations
    networks:
      - datastore-network
      - caddy-network
    expose:
      - "8000"

  grafana:
    image: docker-hub.vgorovetskiy.keenetic.pro/grafana:12.3.0
    container_name: data_storage_grafana
    env_file: .env
    depends_on:
      - db
    volumes:
      - grafana_data:/var/lib/grafana
      - grafana_config:/etc/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    expose:
      - "3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=${GRAFANA_DOMAIN}
      - GF_SERVER_ROOT_URL=https://${GRAFANA_DOMAIN}/
      - GF_SERVER_SERVE_FROM_SUB_PATH=false
    networks:
      - datastore-network
      - caddy-network

volumes:
  pgdata:
  grafana_data:
  grafana_config:

networks:
  datastore-network:
    driver: bridge
  caddy-network:
    external: true
