version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] [%(name)s] %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: standard
    level: DEBUG
    stream: ext://sys.stderr

loggers:
  uvicorn:
    handlers: [console]
    level: INFO
    propagate: false

  uvicorn.error:
    handlers: [console]
    level: INFO
    propagate: false

  uvicorn.access:
    handlers: [console]
    level: INFO
    propagate: false

  datastore:
    handlers: [console]
    level: INFO
    propagate: false

root:
  handlers: [console]
  level: INFO